<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Micro UI</title>
    <style>
        :root {
            --bg-color: #f4f4f5;
            --card-bg: #ffffff;
            --text-main: #18181b;
            --text-muted: #71717a;
            --accent: #2563eb;
            --border: #e4e4e7;
            --radius: 4px;
            --shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .ui-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            width: 320px;
        }

        h2 {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 16px 0;
            letter-spacing: -0.02em;
            color: var(--text-main);
        }

        /* Новая группа кнопок */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Полностью переписанный стиль кнопок */
        .btn-micro {
            /* Размеры */
            height: 24px; /* Очень маленькая высота */
            padding: 0 10px;
            
            /* Типографика */
            font-size: 11px; /* Микро шрифт */
            font-weight: 500;
            letter-spacing: 0.02em;
            
            /* Внешний вид */
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: var(--radius);
            
            /* Поведение */
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            outline: none;
        }

        /* Состояния */
        .btn-micro:hover {
            background: #fafafa;
            border-color: #d4d4d8;
            color: var(--text-main);
            transform: translateY(-1px);
        }

        .btn-micro:active {
            transform: translateY(0);
            background: #f4f4f5;
        }

        /* Вариант: Primary (Акцентная) */
        .btn-micro.primary {
            background: var(--text-main);
            border-color: var(--text-main);
            color: #ffffff;
        }

        .btn-micro.primary:hover {
            background: #000;
            border-color: #000;
            opacity: 0.9;
        }

        /* Вариант: Danger (Красная) */
        .btn-micro.danger {
            color: #ef4444;
            border-color: #fee2e2;
            background: #fef2f2;
        }

        .btn-micro.danger:hover {
            background: #fee2e2;
            border-color: #fecaca;
        }

        /* Иконки внутри кнопок (SVG) */
        .btn-micro svg {
            width: 12px;
            height: 12px;
            stroke-width: 2.5;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 16px 0;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .label-text {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

    </style>
</head>
<body>

    <div class="ui-card">
        <h2>Настройки интерфейса</h2>

        <div class="label-row">
            <span class="label-text">Действия</span>
        </div>
        
        <div class="button-group">
            <!-- Обычная микро кнопка -->
            <button class="btn-micro">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                Добавить
            </button>

            <!-- Акцентная микро кнопка -->
            <button class="btn-micro primary">
                Сохранить изменения
            </button>

            <!-- Кнопка только с иконкой -->
            <button class="btn-micro" aria-label="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </div>

        <div class="divider"></div>

        <div class="label-row">
            <span class="label-text">Зона риска</span>
        </div>

        <div class="button-group">
            <button class="btn-micro danger">
                Удалить файл
            </button>
        </div>
    </div>

</body>
</html>
